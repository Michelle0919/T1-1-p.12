<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronoun Power: Contraction Challenge</title>
    <style>
        :root {
            --primary-color: #2196F3;
            --secondary-color: #FFC107;
            --success-color: #4CAF50;
            --danger-color: #F44336;
            --bg-color: #E3F2FD;
            --text-color: #333333;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 1920px;
            max-height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 40px;
        }

        .active {
            display: flex;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Top Bar */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px 50px;
            background-color: var(--white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .stat-box {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            background: var(--bg-color);
            padding: 10px 30px;
            border-radius: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-box span {
            color: var(--danger-color);
        }

        /* Timer */
        #timer-container {
            position: absolute;
            top: 120px;
            right: 50px;
            width: 120px;
            height: 120px;
            background-color: var(--white);
            border: 8px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary-color);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }

        .timer-warning {
            border-color: var(--danger-color) !important;
            color: var(--danger-color) !important;
            animation: pulse 0.5s infinite alternate;
        }

        /* Game Area */
        #game-area {
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 1200px;
        }

        #question-box {
            background-color: var(--white);
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #level-indicator {
            font-size: 2rem;
            color: var(--secondary-color);
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #question-text {
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-color);
        }

        /* Options */
        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
        }

        .option-btn {
            background-color: var(--white);
            border: 4px solid var(--primary-color);
            color: var(--primary-color);
            padding: 30px;
            font-size: 2.8rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 var(--primary-color);
        }

        .option-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 11px 0 var(--primary-color);
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--primary-color);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: var(--white) !important;
            box-shadow: 0 6px 0 #2E7D32 !important;
        }

        .option-btn.wrong {
            background-color: var(--danger-color) !important;
            border-color: var(--danger-color) !important;
            color: var(--white) !important;
            box-shadow: 0 6px 0 #C62828 !important;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Feedback & Next Button */
        #feedback-area {
            height: 100px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #feedback-text {
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #next-btn, .start-btn, .restart-btn {
            background-color: var(--secondary-color);
            border: none;
            color: var(--text-color);
            padding: 20px 50px;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #FFA000;
            transition: all 0.2s;
            display: none;
            margin-top: 20px;
        }

        #next-btn:hover, .start-btn:hover, .restart-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 11px 0 #FFA000;
        }

        #next-btn:active, .start-btn:active, .restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #FFA000;
        }

        .start-btn, .restart-btn {
            display: block;
            margin-top: 40px;
            font-size: 3rem;
        }

        /* Start / End Screens */
        .title {
            font-size: 6rem;
            color: var(--primary-color);
            text-shadow: 3px 3px 0 var(--white), 6px 6px 0 rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .subtitle {
            font-size: 3.5rem;
            color: var(--text-color);
            margin-bottom: 50px;
        }

        .summary-table {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 2rem;
            margin: 30px 0;
            border-collapse: separate;
            border-spacing: 15px 10px;
        }

        .summary-table td {
            padding: 10px 20px;
            background: var(--bg-color);
            border-radius: 10px;
            font-weight: bold;
        }

        .summary-table td span {
            color: var(--danger-color);
        }

        .final-score-text {
            font-size: 4rem;
            color: var(--success-color);
            font-weight: bold;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); box-shadow: 0 0 20px var(--danger-color); }
        }

        @keyframes streakAnim {
            0% { transform: scale(1) rotate(0deg); color: var(--secondary-color); }
            50% { transform: scale(1.3) rotate(-5deg); color: var(--danger-color); }
            100% { transform: scale(1) rotate(0deg); color: var(--secondary-color); }
        }

        .streak-effect {
            animation: streakAnim 0.6s ease-in-out;
            color: var(--secondary-color) !important;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h1 class="title">Pronoun Power</h1>
        <h2 class="subtitle">Contraction Challenge</h2>
        <button class="start-btn" onclick="initGame()">START GAME</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="top-bar">
            <div class="stat-box">Level: <span id="ui-level">1</span></div>
            <div class="stat-box">Combo: <span id="ui-combo">0</span></div>
            <div class="stat-box">Score: <span id="ui-score">0</span></div>
        </div>

        <div id="timer-container">
            <span id="ui-timer">20</span>
        </div>

        <div id="game-area">
            <div id="question-box">
                <div id="level-indicator">Level 1: Match It</div>
                <div id="question-text">I am</div>
            </div>

            <div id="options-container">
                </div>

            <div id="feedback-area">
                <div id="feedback-text">Great!</div>
                <button id="next-btn" onclick="nextQuestion()">Next Mission ➔</button>
            </div>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1 class="title" style="color: var(--success-color);">Mission Complete!</h1>
        <div class="final-score-text">Final Score: <span id="ui-final-score">0</span></div>
        
        <table class="summary-table">
            <tr>
                <td>I am ➔ <span>I'm</span></td>
                <td>He is ➔ <span>He's</span></td>
                <td>She is ➔ <span>She's</span></td>
            </tr>
            <tr>
                <td>It is ➔ <span>It's</span></td>
                <td>We are ➔ <span>We're</span></td>
                <td>You are ➔ <span>You're</span></td>
            </tr>
            <tr>
                <td colspan="3" style="text-align: center;">They are ➔ <span>They're</span></td>
            </tr>
        </table>

        <button class="restart-btn" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    // Game Data
    const gameData = [
        {
            levelName: "Level 1: Match It",
            timeLimit: 20,
            questions: [
                { q: "I am", options: ["I'm", "I am", "I's", "Im"], answer: "I'm" },
                { q: "She is", options: ["She're", "She's", "Shes", "She'is"], answer: "She's" },
                { q: "We are", options: ["We's", "We're", "Were", "We'am"], answer: "We're" }
            ]
        },
        {
            levelName: "Level 2: Fill the Gap",
            timeLimit: 18,
            questions: [
                { q: "He ____ 10.", options: ["am", "is", "are", "be"], answer: "is" },
                { q: "You ____ my friend.", options: ["am", "is", "are", "be"], answer: "are" },
                { q: "I ____ happy.", options: ["am", "is", "are", "be"], answer: "am" }
            ]
        },
        {
            levelName: "Level 3: Transform It",
            timeLimit: 16,
            questions: [
                { q: "They are happy.", options: ["They're happy.", "They's happy.", "There happy.", "They are're happy."], answer: "They're happy." },
                { q: "It is a dog.", options: ["Its a dog.", "It's a dog.", "It'is a dog.", "It'are a dog."], answer: "It's a dog." },
                { q: "We are late.", options: ["Were late.", "We's late.", "We're late.", "We are'late."], answer: "We're late." }
            ]
        },
        {
            levelName: "Level 4: Boss Round",
            timeLimit: 12,
            questions: [
                { q: "Which is correct?", options: ["I's a student.", "She're my mom.", "He's tall.", "They is playing."], answer: "He's tall." },
                { q: "Which is correct?", options: ["We're jumping.", "It'are raining.", "You's smart.", "I'are running."], answer: "We're jumping." },
                { q: "Which is correct?", options: ["She'am nice.", "They're eating.", "He'are sleeping.", "We'is reading."], answer: "They're eating." }
            ]
        }
    ];

    // Game Variables
    let currentLevelIndex = 0;
    let currentQuestionIndex = 0;
    let score = 0;
    let combo = 0;
    let timerInterval;
    let timeLeft = 0;
    let isAnswering = false;

    // Audio (Speech Synthesis)
    const synth = window.speechSynthesis;

    function speak(text) {
        if(synth.speaking) {
            synth.cancel();
        }
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = 0.9;
        utterThis.pitch = 1.1;
        synth.speak(utterThis);
    }

    // Function to firmly shuffle an array
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        isAnswering = false;
        const levelData = gameData[currentLevelIndex];
        const questionData = levelData.questions[currentQuestionIndex];

        // Update UI
        document.getElementById('ui-level').innerText = currentLevelIndex + 1;
        document.getElementById('level-indicator').innerText = levelData.levelName;
        document.getElementById('question-text').innerText = questionData.q;
        
        // Reset Feedback and Next Button
        const feedbackText = document.getElementById('feedback-text');
        feedbackText.style.opacity = 0;
        feedbackText.classList.remove('streak-effect');
        document.getElementById('next-btn').style.display = 'none';

        // Render Options (Shuffle them)
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        let shuffledOptions = shuffleArray([...questionData.options]);
        
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsContainer.appendChild(btn);
        });

        // Setup Timer
        timeLeft = levelData.timeLimit;
        updateTimerUI();
        clearInterval(timerInterval);
        timerInterval = setInterval(handleTimer, 1000);

        // Remove animation class to restart it
        const qBox = document.getElementById('question-box');
        qBox.style.animation = 'none';
        qBox.offsetHeight; /* trigger reflow */
        qBox.style.animation = 'popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

        // Speak the question (replace underscores with the correct answer so it reads a full sentence)
        const textToSpeak = questionData.q.replace(/_+/g, questionData.answer);
        speak(textToSpeak);
    }

    function handleTimer() {
        if (isAnswering) return;
        
        timeLeft--;
        updateTimerUI();

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeUp();
        }
    }

    function updateTimerUI() {
        const timerEl = document.getElementById('timer-container');
        document.getElementById('ui-timer').innerText = timeLeft;
        
        if (timeLeft <= 5 && timeLeft > 0) {
            timerEl.classList.add('timer-warning');
        } else {
            timerEl.classList.remove('timer-warning');
        }
    }

    function timeUp() {
        isAnswering = true;
        combo = 0;
        updateStatsUI();
        
        const questionData = gameData[currentLevelIndex].questions[currentQuestionIndex];
        
        // Disable all buttons and highlight correct one
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.classList.add('disabled');
            if (btn.innerText === questionData.answer) {
                btn.classList.add('correct');
            }
        });

        showFeedback(`Time's up! Answer: ${questionData.answer}`, 'var(--danger-color)');
        document.getElementById('next-btn').style.display = 'block';
    }

    function checkAnswer(selectedOption, buttonElement) {
        if (isAnswering) return;
        isAnswering = true;
        clearInterval(timerInterval);

        const questionData = gameData[currentLevelIndex].questions[currentQuestionIndex];
        const isCorrect = selectedOption === questionData.answer;

        // Disable all buttons
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.classList.add('disabled'));

        if (isCorrect) {
            buttonElement.classList.add('correct');
            score += 10;
            combo++;
            
            let feedbackMsg = "Great!";
            let fColor = 'var(--success-color)';
            let doStreakAnim = false;

            if (combo >= 3) {
                score += 20;
                feedbackMsg = "Power Streak!";
                fColor = 'var(--secondary-color)';
                doStreakAnim = true;
            } else if (combo === 2) {
                feedbackMsg = "Awesome!";
            }

            updateStatsUI();
            showFeedback(feedbackMsg, fColor, doStreakAnim);

        } else {
            buttonElement.classList.add('wrong');
            combo = 0;
            updateStatsUI();
            
            // Highlight correct answer
            buttons.forEach(btn => {
                if (btn.innerText === questionData.answer) {
                    btn.classList.add('correct');
                }
            });

            showFeedback(`Wrong! Answer: ${questionData.answer}`, 'var(--danger-color)');
        }

        document.getElementById('next-btn').style.display = 'block';
    }

    function showFeedback(text, color, streakAnim = false) {
        const feedbackText = document.getElementById('feedback-text');
        feedbackText.innerText = text;
        feedbackText.style.color = color;
        feedbackText.style.opacity = 1;
        
        if (streakAnim) {
            feedbackText.classList.add('streak-effect');
        }
        
        speak(text);
    }

    function updateStatsUI() {
        document.getElementById('ui-score').innerText = score;
        document.getElementById('ui-combo').innerText = combo;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        // Check if level is complete
        if (currentQuestionIndex >= gameData[currentLevelIndex].questions.length) {
            currentQuestionIndex = 0;
            currentLevelIndex++;
        }

        // Check if game is complete
        if (currentLevelIndex >= gameData.length) {
            finishGame();
        } else {
            renderQuestion();
        }
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        document.getElementById('ui-final-score').innerText = score;
        
        speak("Mission Complete! Your final score is " + score);
    }

    function resetGame() {
        currentLevelIndex = 0;
        currentQuestionIndex = 0;
        score = 0;
        combo = 0;
        updateStatsUI();
        
        document.getElementById('end-screen').classList.remove('active');
        initGame();
    }
</script>

</body>
</html>
